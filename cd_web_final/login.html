<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CD.COM — Login</title>
<script src="cd_web_api.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F4F6FB;display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-card{background:#fff;border-radius:20px;padding:40px;width:100%;max-width:420px;box-shadow:0 8px 32px rgba(0,0,0,.10)}
.logo{font-size:28px;font-weight:900;letter-spacing:-1px;margin-bottom:4px}
.logo span{color:#1B6B3A}
.tagline{font-size:13px;color:#64748B;margin-bottom:32px}
h2{font-size:20px;font-weight:800;margin-bottom:6px}
.sub{font-size:13px;color:#64748B;margin-bottom:24px}
label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px}
input{width:100%;border:1.5px solid #E5E7EB;border-radius:9px;padding:11px 14px;font-size:14px;font-family:inherit;outline:none;transition:.15s;margin-bottom:16px}
input:focus{border-color:#1B6B3A}
.btn{width:100%;background:#1B6B3A;color:#fff;border:none;border-radius:9px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;transition:.15s;font-family:inherit}
.btn:hover{background:#155A2F}
.btn:disabled{background:#9CA3AF;cursor:not-allowed}
.error-msg{background:#FEE2E2;border:1px solid #FECACA;border-radius:8px;padding:10px 14px;color:#DC2626;font-size:13px;margin-bottom:14px;display:none}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.users-hint{margin-top:24px;border-top:1px solid #E5E7EB;padding-top:18px}
.users-hint p{font-size:11px;color:#9CA3AF;margin-bottom:8px;font-weight:600}
.quick-btn{display:block;width:100%;text-align:left;padding:8px 12px;border-radius:7px;border:1px solid #E5E7EB;background:#F9FAFB;font-size:12px;color:#374151;cursor:pointer;margin-bottom:6px;transition:.1s;font-family:inherit}
.quick-btn:hover{border-color:#1B6B3A;background:#E8F5E9}
.quick-btn strong{color:#1B6B3A}
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">CD<span>.COM</span></div>
  <div class="tagline">Supermarket Management System</div>
  <h2>Welcome back 👋</h2>
  <div class="sub">Sign in to access your dashboard</div>

  <div class="error-msg" id="err"></div>

  <label>Email / Username</label>
  <input type="text" id="login" placeholder="Enter your email" autocomplete="username">

  <label>Password</label>
  <input type="password" id="pass" placeholder="Enter your password" autocomplete="current-password">

  <button class="btn" id="btn" onclick="doLogin()">Sign In</button>

  <!-- Quick login for testing -->
  <div class="users-hint">
    <p>QUICK LOGIN — CLICK TO FILL</p>
    <button class="quick-btn" onclick="fill('owner@eicoop','dds@123')">👔 <strong>Company Owner</strong> — owner@eicoop</button>
    <button class="quick-btn" onclick="fill('deliverman@eicoop','dds@123')">🚚 <strong>Delivery Manager</strong> — deliverman@eicoop</button>
    <button class="quick-btn" onclick="fill('storekeeper2@eicoop.ae1','dds@123')">📦 <strong>Store Keeper</strong> — storekeeper2@eicoop.ae1</button>
  </div>
</div>

<script>
function fill(l, p) {
  document.getElementById('login').value = l;
  document.getElementById('pass').value  = p;
}

// Auto-redirect if already logged in
if (CdApi.isLoggedIn()) redirect(CdApi.roleCode());

async function doLogin() {
  const btn   = document.getElementById('btn');
  const err   = document.getElementById('err');
  const login = document.getElementById('login').value.trim();
  const pass  = document.getElementById('pass').value;

  if (!login || !pass) {
    err.textContent = 'Please enter email and password.';
    err.style.display = 'block'; return;
  }

  btn.disabled  = true;
  btn.innerHTML = '<span class="spinner"></span>Signing in...';
  err.style.display = 'none';

  try {
    const result = await CdApi.login({ login, password: pass });
    if (result.uid) {
      redirect(CdApi.roleCode());
    } else {
      err.textContent = result.error || 'Invalid email or password.';
      err.style.display = 'block';
      btn.disabled  = false;
      btn.innerHTML = 'Sign In';
    }
  } catch(e) {
    err.textContent = 'Connection error: ' + e.message;
    err.style.display = 'block';
    btn.disabled  = false;
    btn.innerHTML = 'Sign In';
  }
}

function redirect(role) {
  // Change web1_ to web6_ if you use the dark theme
  const theme = localStorage.getItem('cd_theme') || 'web1';
  const map = {
    'company_owner':    theme + '_owner_dashboard.html',
    'store_manager':    theme + '_owner_dashboard.html',
    'delivery_manager': theme + '_delivery_dashboard.html',
    'delivery_boy':     theme + '_delivery_dashboard.html',
    'stock_manager':    theme + '_stock_dashboard.html',
  };
  window.location.href = map[role] || theme + '_owner_dashboard.html';
}

// Enter key
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
