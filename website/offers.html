<script src="js/api-cache.js?v=1"></script><script src="js/error-logger.js?v=1.0"></script>
<script src="js/api.js?v=8.9"></script><script src="js/app.js?v=8.15"></script><script src="js/layout.js?v=15.1"></script>
<script>
async function load(){
  Bar.start();

  Promise.allSettled([
    API.getDealOfDay(),     // 0
    API.getBestSeller(),    // 1
    API.getRecommended(),   // 2
    API.getFeatured(),      // 3
    API.getFreshPick()      // 4
  ]).then(function (results) {
    if (results[0].status === 'fulfilled') {
      buildDealSection(results[0].value.data && results[0].value.data[0], 'ddProds', 'ddTtl');
    } else {
      document.getElementById('ddProds').innerHTML = '<div style="padding:20px;color:#9ca3af">No deals today</div>';
    }

    if (results[1].status === 'fulfilled') {
      buildDealSection(results[1].value.data && results[1].value.data[0], 'bsProds', 'bsTtl');
    } else {
      var bs = document.getElementById('bsProds'); if (bs) bs.innerHTML = '<div style="padding:20px;color:#9ca3af">No products</div>';
    }

    if (results[2].status === 'fulfilled') {
      buildDealSection(results[2].value.data && results[2].value.data[0], 'recProds', 'recTtl');
    } else {
      var rec = document.getElementById('recProds'); if (rec) rec.innerHTML = '<div style="padding:20px;color:#9ca3af">No products</div>';
    }

    if (results[3].status === 'fulfilled') {
      buildDealSection(results[3].value.data && results[3].value.data[0], 'ftProds', 'ftTtl');
    } else {
      var ft = document.getElementById('ftProds'); if (ft) ft.innerHTML = '<div style="padding:20px;color:#9ca3af">No products</div>';
    }

    if (results[4].status === 'fulfilled') {
      buildDealSection(results[4].value.data && results[4].value.data[0], 'fpProds', 'fpTtl');
    } else {
      var fp = document.getElementById('fpProds'); if (fp) fp.innerHTML = '<div style="padding:20px;color:#9ca3af">No products</div>';
    }
    
    Bar.done();
  });
}
document.addEventListener('DOMContentLoaded',load);
</script></body></html>
