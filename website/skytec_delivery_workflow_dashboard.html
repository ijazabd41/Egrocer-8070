<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Coop Discount — Delivery Workflow</title>
<style>
:root{--primary:#ED1C24;--primary2:#BE161D;--bg:#f4f6f9;--card:#fff;--border:#e5e7eb;--text:#111827;--muted:#6b7280;--green:#16a34a;--blue:#2563eb;--orange:#f97316;--red:#dc2626}
*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:var(--bg);color:var(--text)}
.header{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;padding:16px 20px;display:flex;justify-content:space-between;align-items:center}.header h1{font-size:18px;margin:0}.header small{opacity:.8}.wrap{padding:16px;max-width:1200px;margin:auto}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center}select,input,button{border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-family:inherit}button{cursor:pointer;background:var(--primary);color:#fff;font-weight:700;border:none}button.secondary{background:#fff;color:var(--primary);border:1px solid var(--primary)}button.green{background:var(--green)}button.blue{background:var(--blue)}button.orange{background:var(--orange)}button.red{background:var(--red)}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}.kpi{background:var(--card);border-radius:12px;padding:14px;border:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.04)}.kpi b{font-size:24px}.kpi span{display:block;color:var(--muted);font-size:12px;text-transform:uppercase;margin-top:4px}
.tabs{display:flex;gap:8px;margin:12px 0}.tab{background:#fff;color:var(--primary);border:1px solid var(--primary)}.tab.active{background:var(--primary);color:#fff}.panel{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}.panel-head{background:var(--primary);color:#fff;padding:12px 14px;font-weight:800;display:flex;justify-content:space-between;align-items:center}
.table{width:100%;border-collapse:collapse}.table th,.table td{padding:10px;border-bottom:1px solid var(--border);font-size:13px;text-align:left;vertical-align:top}.table th{background:#fafafa;color:var(--muted);font-size:12px;text-transform:uppercase}
.badge{display:inline-block;padding:3px 8px;border-radius:999px;font-size:11px;font-weight:800}.new{background:#ffedd5;color:#c2410c}.approved{background:#dbeafe;color:#1d4ed8}.ready{background:#cffafe;color:#0e7490}.accepted{background:#ede9fe;color:#6d28d9}.delivered{background:#dcfce7;color:#15803d}.cancelled{background:#fee2e2;color:#b91c1c}.actions{display:flex;gap:6px;flex-wrap:wrap}.empty{text-align:center;color:var(--muted);padding:30px}.err{display:none;background:#fee2e2;color:#991b1b;padding:10px;border-radius:8px;margin-bottom:10px}
@media(max-width:800px){
  .kpis{grid-template-columns:repeat(2,1fr)}
  .header{display:block}
  .toolbar{display:block}.toolbar>*{width:100%;margin:4px 0}
  .table thead{display:none}
  .table, .table tbody, .table tr, .table td {display:block;width:100%}
  .table tr{margin-bottom:12px;background:#fff;border-radius:12px;border:1px solid var(--border);padding:12px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
  .table td{border:none;padding:6px 0;text-align:left}
  .table td::before{content:attr(data-label);font-weight:700;display:block;font-size:11px;color:var(--muted);text-transform:uppercase;margin-bottom:2px}
  .actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .actions button {flex:1}
}
</style>
</head>
<body>
<div class="header"><div><h1>Coop Discount — Delivery Workflow</h1><small>Store Manager / Store Keeper realtime dashboard</small></div><div style="display:flex;gap:10px;"><button style="background:rgba(255,255,255,0.2);color:#fff;border:1px solid rgba(255,255,255,0.5);" onclick="location.href='index.html'">&#x1F3E0; Home</button><button style="background:rgba(255,255,255,0.2);color:#fff;border:1px solid rgba(255,255,255,0.5);" onclick="logoutDashboard()">&#x1F6AA; Logout</button></div></div>
<div class="wrap">
<div id="err" class="err"></div>
<div class="toolbar">
<select id="role"><option value="store_manager">Store Manager</option><option value="store_keeper">Store Keeper</option><option value="delivery">Delivery Boy</option><option value="admin">ERP Admin / Delivery Manager</option></select>
<select id="period"><option value="all">All Time</option><option value="today">Today</option><option value="this_week">This Week</option><option value="this_month">This Month</option></select>
<select id="dashStatus" onchange="loadDashboard()"><option value="all">All Statuses</option><option value="new">New</option><option value="approved">Approved</option><option value="ready">Ready</option><option value="pickup">Pickup</option><option value="delivered">Delivered</option></select>
<select id="dashSource" onchange="loadDashboard()"><option value="all">All Sources</option><option value="coopplus_web">COOPPLUS Web</option><option value="coopplus_mobile">COOPPLUS Mobile</option><option value="coopdiscount_web">COOP Discount Web</option><option value="coopdiscount_mobile">COOP Discount Mobile</option><option value="talabat">Talabat</option><option value="noon">Noon</option><option value="instashop">Instashop</option><option value="other">Other</option></select>
<input id="limit" type="number" value="25" min="1" max="100" placeholder="limit"/>
<input id="offset" type="number" value="0" min="0" placeholder="offset"/>
<input id="sessionId" placeholder="Paste session_id cookie here"/>
<button onclick="saveSession()">Save Session</button><button class="secondary" onclick="loadDashboard()">Refresh</button>
</div>
<div class="kpis"><div class="kpi"><b id="kTotal">0</b><span>Total</span></div><div class="kpi"><b id="kNew">0</b><span>New</span></div><div class="kpi"><b id="kApproved">0</b><span>Approved</span></div><div class="kpi"><b id="kReady">0</b><span>Ready</span></div></div>
<div class="tabs"><button id="btnList" class="tab active" onclick="setView('list')">List View</button><button id="btnKanban" class="tab" onclick="setView('kanban')">Kanban View</button></div>
<div class="panel"><div class="panel-head"><span id="queueTitle">Realtime Orders</span><span id="lastRefresh"></span></div><div id="orders"></div></div>
</div>
<script>
const ODOO_URL = 'http://cooperp.freeddns.org:8070';
let BASE_URL = ODOO_URL;
if (location.hostname === 'localhost' || location.hostname === '127.0.0.1' || ['3000', '5500', '8000', '8080'].includes(location.port)) {
  BASE_URL = `http://${location.hostname}:3001/proxy`;
} else if (location.protocol !== 'file:') {
  if (location.hostname.includes('cooperp.freeddns.org')) {
    BASE_URL = location.origin;
  } else {
    BASE_URL = location.origin + '/proxy.php';
  }
}
let currentView='list';let currentItems=[];
function sid(){return localStorage.getItem('odoo_session_id')||document.getElementById('sessionId').value.trim()}
function saveSession(){localStorage.setItem('odoo_session_id',document.getElementById('sessionId').value.trim());loadDashboard()}
function logoutDashboard(){localStorage.removeItem('odoo_session_id');localStorage.removeItem('cd_session');localStorage.removeItem('cd_role_code');location.href='login.html';}
function showErr(m){const e=document.getElementById('err');e.style.display=m?'block':'none';e.textContent=m||''}
function badge(s){return `<span class="badge ${s||'new'}">${s||'new'}</span>`}
function val(o,...keys){for(const k of keys){if(o&&o[k]!==undefined&&o[k]!==null&&o[k]!==''){const v=o[k];if(Array.isArray(v)&&v.length===2&&typeof v[0]==='number')return v[1];if(typeof v==='object'&&!Array.isArray(v))return v.name||v.display_name||v.id||'';return v;}}return''}
async function apiGet(path,params={}){const url=new URL(BASE_URL+path);Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));const res=await fetch(url,{method:'GET',credentials:'include',headers:{'Accept':'application/json','Content-Type':'application/json','Cookie':'session_id='+sid()}});const txt=await res.text();if(txt.trim().startsWith('<'))throw new Error('Odoo returned HTML/login page. Check session_id cookie.');return JSON.parse(txt)}
async function apiPost(path,body){const res=await fetch(BASE_URL+path,{method:'POST',credentials:'include',headers:{'Accept':'application/json','Content-Type':'application/json','Cookie':'session_id='+sid()},body:JSON.stringify(body)});const txt=await res.text();if(txt.trim().startsWith('<'))throw new Error('Odoo returned HTML/login page. Check session_id cookie.');return JSON.parse(txt)}
function selectQueue(data){const role=document.getElementById('role').value;if(role==='store_manager')return data.store_manager_queue||[];if(role==='store_keeper')return data.store_keeper_queue||[];if(role==='delivery')return data.delivery_queue||[];return data.workflow_orders||data.recent_orders||[]}
async function loadDashboard(){
  showErr('');
  try{
    const params={by_AJR:1,period:document.getElementById('period').value,limit:document.getElementById('limit').value,offset:document.getElementById('offset').value};
    const dashStatus = document.getElementById('dashStatus').value;
    if (dashStatus && dashStatus !== 'all') params.status = dashStatus;
    const dashSource = document.getElementById('dashSource').value;
    if (dashSource && dashSource !== 'all') params.source = dashSource;
    const r=await apiGet('/api/skytec-delivery/dashboard',params);
    const data=r.data||r;
    const t=data.totals||{};
    document.getElementById('kTotal').textContent=t.total||0;
    document.getElementById('kNew').textContent=t.new||t.pending||0;
    document.getElementById('kApproved').textContent=t.approved||0;
    document.getElementById('kReady').textContent=t.ready||0;
    
    if (dashStatus !== 'all' || dashSource !== 'all') {
      document.getElementById('queueTitle').textContent = 'Filtered Orders';
      // Use the orders endpoint for explicitly filtered views
      const ordParams = { ...params };
      if (dashStatus !== 'all') ordParams.state = dashStatus;
      const or = await apiGet('/api/skytec-delivery/orders', ordParams);
      currentItems = or.data?.results || or.results || or.data || [];
    } else {
      currentItems=selectQueue(data);
      document.getElementById('queueTitle').textContent=document.getElementById('role').selectedOptions[0].text+' Queue';
    }
    
    document.getElementById('lastRefresh').textContent=new Date().toLocaleTimeString();
    render();
  }catch(e){showErr(e.message)}
}
function setView(v){currentView=v;document.getElementById('btnList').classList.toggle('active',v==='list');document.getElementById('btnKanban').classList.toggle('active',v==='kanban');render()}
function render(){if(!currentItems.length){document.getElementById('orders').innerHTML='<div class="empty">No records found</div>';return}if(currentView==='kanban'){document.getElementById('orders').innerHTML=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;padding:12px">${currentItems.map(card).join('')}</div>`}else{document.getElementById('orders').innerHTML=`<table class="table"><thead><tr><th>Order</th><th>Customer</th><th>Source</th><th>Status</th><th>Responsible</th><th>Actions</th></tr></thead><tbody>${currentItems.map(row).join('')}</tbody></table>`}}
function row(o){
  const state=val(o,'delivery_state','state');
  const phone=val(o,'partner_phone');
  const address=val(o,'partner_address');
  const lat=val(o,'partner_latitude');
  const lng=val(o,'partner_longitude');
  
  let custHtml = `${val(o,'partner','customer','partner_name')}`;
  if (phone) custHtml += `<br><small>📞 ${phone}</small>`;
  if (address) custHtml += `<br><small>📍 ${address}</small>`;
  if (lat && lng) {
    custHtml += `<br><button onclick="window.open('https://maps.google.com/?q=${lat},${lng}','_blank')" style="background:#e0f2fe;color:#0284c7;border:none;border-radius:4px;padding:2px 6px;font-size:10px;font-weight:700;margin-top:2px;cursor:pointer;">📍 Map</button>`;
  }
  
  return `<tr><td data-label="Order"><b>${val(o,'name')}</b><br><small><b>Created:</b> ${val(o,'create_date')||'-'}</small><br><small><b>Delivery:</b> ${val(o,'scheduled_date','date_deadline')||'-'}</small></td><td data-label="Customer">${custHtml}</td><td data-label="Source">${val(o,'source','delivery_source')}</td><td data-label="Status">${badge(state)}</td><td data-label="Responsible">${val(o,'store_manager','store_keeper','driver','responsible')||'-'}</td><td data-label="Actions"><div class="actions">${buttons(o,state)}</div></td></tr>`
}

function card(o){
  const state=val(o,'delivery_state','state');
  const phone=val(o,'partner_phone');
  const address=val(o,'partner_address');
  const lat=val(o,'partner_latitude');
  const lng=val(o,'partner_longitude');
  
  let custHtml = `${val(o,'partner','customer','partner_name')||'-'}`;
  if (phone) custHtml += ` (📞 ${phone})`;
  if (address) custHtml += `<br>📍 ${address}`;
  if (lat && lng) {
    custHtml += ` <button onclick="window.open('https://maps.google.com/?q=${lat},${lng}','_blank')" style="background:#e0f2fe;color:#0284c7;border:none;border-radius:4px;padding:2px 6px;font-size:10px;font-weight:700;cursor:pointer;margin-left:4px;">📍 Map</button>`;
  }
  
  return `<div class="kpi" style="text-align:left"><b style="font-size:15px">${val(o,'name')}</b><br>${badge(state)}<p style="margin:8px 0;font-size:11px;color:var(--muted)"><b>Created:</b> ${val(o,'create_date')||'-'}<br><b>Delivery:</b> ${val(o,'scheduled_date','date_deadline')||'-'}</p><p><b>Customer:</b> ${custHtml}</p><p><b>Source:</b> ${val(o,'source','delivery_source')||'-'}</p><p><b>Responsible:</b> ${val(o,'store_manager','store_keeper','driver','responsible')||'-'}</p><div class="actions">${buttons(o,state)}</div></div>`
}
function buttons(o,state){
  const id=val(o,'id','picking_id');
  const allowed=o.allowed_actions;
  const role=document.getElementById('role').value;
  const isManager = role === 'store_manager' || role === 'stock_manager';
  let b=`<button class="secondary" onclick="openOdoo(${id})">Open</button><button class="secondary" onclick="viewItems(${id})">Items</button>`;
  
  if (Array.isArray(allowed)) {
    if (allowed.includes('approve') && role !== 'store_keeper') b+=`<button class="green" onclick="doAction(${id},'approve',this)">Approve</button>`;
    if (allowed.includes('ready') && !isManager) b+=`<button class="blue" onclick="doAction(${id},'ready',this)">Mark Ready</button>`;
    if (allowed.includes('assign_driver') && !isManager) b+=`<button class="orange" onclick="assignDriver(${id},this)">Assign Driver</button>`;
    if (allowed.includes('notify_drivers')) b+=`<button class="green" onclick="doAction(${id},'notify_drivers',this)">Notify Drivers</button>`;
    if (allowed.includes('accept')) b+=`<button class="blue" onclick="doAction(${id},'accept',this)">Accept</button>`;
    if (allowed.includes('delivered')) b+=`<button class="green" onclick="doAction(${id},'delivered',this)">Delivered</button>`;
    if (allowed.includes('cancel')) b+=`<button class="red" onclick="doAction(${id},'cancel',this)">Cancel</button>`;
  } else {
    if (state==='new' && role !== 'store_keeper') b+=`<button class="green" onclick="doAction(${id},'approve',this)">Approve</button>`;
    else if (state==='approved') {
      if (!isManager) b+=`<button class="blue" onclick="doAction(${id},'ready',this)">Mark Ready</button>`;
      if (!isManager) b+=`<button class="orange" onclick="assignDriver(${id},this)">Assign Driver</button>`;
    } else if (state==='ready') {
      b+=`<button class="green" onclick="doAction(${id},'notify_drivers',this)">Notify Drivers</button>`;
      if (!isManager) b+=`<button class="orange" onclick="assignDriver(${id},this)">Assign Driver</button>`;
    } else if (state==='dispatched' || state==='accepted') b+=`<button class="green" onclick="doAction(${id},'delivered',this)">Delivered</button>`;
  }

  // Always show labels for statuses if applicable
  if (state==='ready' && (!Array.isArray(allowed) || !allowed.includes('notify_drivers'))) b+=`<span style="font-size:12px;color:var(--muted);margin-left:8px;font-weight:600">Waiting for Driver</span>`;
  if (state==='accepted') b+=`<span style="font-size:12px;color:var(--primary);margin-left:8px;font-weight:600">Driver Accepted</span>`;
  if (state==='delivered') b+=`<span style="font-size:12px;color:var(--green);margin-left:8px;font-weight:600">Delivered</span>`;
  if (state==='cancelled') b+=`<span style="font-size:12px;color:var(--red);margin-left:8px;font-weight:600">Cancelled</span>`;

  return b;
}
function openOdoo(id){window.open(ODOO_URL+'/web#id='+id+'&model=stock.picking&view_type=form','_blank')}
async function viewItems(id) {
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;';
  overlay.innerHTML='<div style="background:#fff;padding:20px;border-radius:12px;width:400px;max-width:90%;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 10px 25px rgba(0,0,0,0.2);"><h3 style="margin-top:0;margin-bottom:12px;font-size:16px;">🛒 Order Items</h3><div id="vi-content" style="overflow-y:auto;flex:1;padding-right:4px;"><div style="text-align:center;color:#666;padding:20px;">Loading...</div></div><button id="vi-close" style="width:100%;background:#f3f4f6;color:#374151;border:none;padding:12px;margin-top:15px;border-radius:8px;font-weight:700;cursor:pointer;">Close</button></div>';
  document.body.appendChild(overlay);
  document.getElementById('vi-close').onclick=()=>document.body.removeChild(overlay);
  
  try {
    const o = currentItems.find(x => val(x,'id','picking_id') === id);
    let lines = [];
    if (o) {
        if (o.sale_id && o.sale_id.order_line) lines = o.sale_id.order_line;
        else if (o.move_ids_without_package) lines = o.move_ids_without_package;
        else if (o.move_lines) lines = o.move_lines;
        else if (o.move_ids) lines = o.move_ids;
    }
    
    if (!lines || lines.length === 0) {
        const r = await apiGet('/api/rider-delivery/'+id, {by_AJR:1});
        const d = r.data && Array.isArray(r.data) ? r.data[0] : (r.data || r);
        if (d) {
            if (d.sale_id && d.sale_id.order_line) lines = d.sale_id.order_line;
            else if (d.move_ids_without_package) lines = d.move_ids_without_package;
            else if (d.move_lines) lines = d.move_lines;
            else if (d.move_ids) lines = d.move_ids;
        }
    }
    
    if (lines && lines.length > 0) {
        document.getElementById('vi-content').innerHTML = lines.map(l => {
            const name = l.product_id ? (Array.isArray(l.product_id) ? (typeof l.product_id[0] === 'object' ? (l.product_id[0].display_name || l.product_id[0].name) : l.product_id[1]) : l.product_id.name || l.product_id) : (l.name || 'Item');
            const qty = l.product_uom_qty || l.quantity_done || l.quantity || l.qty_done || 1;
            const imgHtml = l.product_id && Array.isArray(l.product_id) && typeof l.product_id[0] === 'object' && l.product_id[0].image_1920 ? `<img src="${BASE_URL}${l.product_id[0].image_1920}" style="width:40px;height:40px;object-fit:contain;margin-right:12px;border-radius:6px;border:1px solid #e5e7eb">` : '<div style="width:40px;height:40px;background:#f3f4f6;border-radius:6px;margin-right:12px;display:flex;align-items:center;justify-content:center;font-size:16px;">📦</div>';
            return '<div style="display:flex;align-items:center;font-size:13px;padding:10px 0;border-bottom:1px solid #f1f5f9">' + imgHtml + '<div style="flex:1;line-height:1.4;color:var(--text);font-weight:500;">' + name + '</div><div style="font-weight:800;margin-left:12px;background:#e0e7ff;color:#4338ca;padding:4px 8px;border-radius:6px;font-size:12px;">x' + qty + '</div></div>';
        }).join('');
    } else {
        document.getElementById('vi-content').innerHTML = '<div style="text-align:center;color:var(--muted);padding:30px">No items found for this order.</div>';
    }
  } catch (e) {
      document.getElementById('vi-content').innerHTML = '<div style="color:var(--red);padding:20px;text-align:center;">Failed to load items:<br>' + e.message + '</div>';
  }
}
function setBtnState(btn,active){if(!btn)return;if(active){btn.dataset.origText=btn.innerHTML;btn.innerHTML='⏳ Wait...';btn.style.opacity='0.6';btn.style.pointerEvents='none'}else{if(btn.dataset.origText)btn.innerHTML=btn.dataset.origText;btn.style.opacity='1';btn.style.pointerEvents='auto'}}
async function doAction(id,action,btn){setBtnState(btn,true);showErr('');try{const r=await apiPost('/api/skytec-delivery/action?by_AJR=1',{picking_id:id,action:action});console.log('doAction response:',r);if(!r || (r.success !== 1 && r.success !== true && String(r.success) !== '1'))throw new Error(r.message||'Action failed');btn.style.display='none';await loadDashboard()}catch(e){setBtnState(btn,false);showErr(e.message)}}
let cachedDrivers=null;
async function assignDriver(id,btn){
  setBtnState(btn,true);showErr('');
  try{
    if(!cachedDrivers){const r=await apiGet('/api/delivery-person?by_AJR=1');cachedDrivers=r.data||r.results||r;}
    setBtnState(btn,false);
    const overlay=document.createElement('div');
    overlay.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;';
    let html='<div style="background:#fff;padding:20px;border-radius:12px;width:300px;max-width:90%;"><h3 style="margin-top:0;">Select Driver</h3>';
    const drvs=Array.isArray(cachedDrivers)?cachedDrivers:[];
    if(drvs.length>0){
      html+='<select id="driverSelect" style="width:100%;margin-bottom:15px;padding:8px;border-radius:6px;border:1px solid #ccc;">';
      drvs.forEach(d=>html+=`<option value="${d.id}">${d.name}</option>`);
      html+='</select><button id="btnConfirmDriver" style="width:100%;background:var(--primary);color:#fff;border:none;padding:10px;border-radius:6px;cursor:pointer;">Assign</button>';
    }else{
      html+='<p>No drivers found.</p>';
    }
    html+='<button id="btnCancelDriver" style="width:100%;background:none;color:#666;border:none;padding:10px;margin-top:5px;cursor:pointer;">Cancel</button></div>';
    overlay.innerHTML=html;document.body.appendChild(overlay);
    if(document.getElementById('btnConfirmDriver'))document.getElementById('btnConfirmDriver').onclick=async()=>{
      const driverId=document.getElementById('driverSelect').value;
      document.body.removeChild(overlay);setBtnState(btn,true);showErr('');
      try{
        const r=await apiPost('/api/skytec-delivery/action?by_AJR=1',{picking_id:id,action:'assign_driver',driver_id:parseInt(driverId)});
        if(!r||(r.success!==1&&r.success!==true&&String(r.success)!=='1'))throw new Error(r.message||'Assign failed');
        await loadDashboard();
      }catch(e){setBtnState(btn,false);showErr(e.message);}
    };
    document.getElementById('btnCancelDriver').onclick=()=>{document.body.removeChild(overlay);setBtnState(btn,false);};
  }catch(e){setBtnState(btn,false);showErr('Failed to load drivers: '+e.message);}
}
setInterval(()=>{if(!document.hidden)loadDashboard()},15000);
window.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('sessionId').value=localStorage.getItem('odoo_session_id')||'';
  const roleCode = localStorage.getItem('cd_role_code');
  if(roleCode) {
    const roleSelect = document.getElementById('role');
    if(roleCode === 'store_manager' || roleCode === 'stock_manager') roleSelect.value = 'store_manager';
    else if(roleCode === 'store_keeper') roleSelect.value = 'store_keeper';
    else if(roleCode === 'delivery_boy') roleSelect.value = 'delivery';
    else if(roleCode === 'admin' || roleCode === 'company_owner' || roleCode === 'delivery_manager') roleSelect.value = 'admin';
    if(roleCode !== 'admin' && roleCode !== 'company_owner' && roleCode !== 'delivery_manager') {
      roleSelect.innerHTML = `<option value="${roleSelect.value}">${roleSelect.options[roleSelect.selectedIndex].text}</option>`;
      roleSelect.disabled = true;
    }
  }
  loadDashboard();
});
document.getElementById('role').addEventListener('change',loadDashboard);
</script></body></html>
